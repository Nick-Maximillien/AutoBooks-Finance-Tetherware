services:
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_backend
    command: gunicorn autobooks.wsgi:application --bind 0.0.0.0:8000
    env_file: .env
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media  
    ports:
      - "8000:8000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cvlabs

  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cvlabs

  redis:
    image: redis:7
    container_name: redis_server
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cvlabs

  django_celery_worker:
    build:
      context: .
      dockerfile: celery_worker.Dockerfile
    container_name: django_celery_worker
    command: celery -A autobooks worker --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    restart: always
    networks:
      - cvlabs

  flower:
    build:
      context: .
      dockerfile: celery_worker.Dockerfile
    container_name: flower_monitor
    command: celery -A autobooks flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    restart: always
    networks:
      - cvlabs

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  cvlabs:
    external: true
